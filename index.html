<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Pokémon Card AR v8</title>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="window._cvReady=true"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
                 font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: white; }

    #stage { position: fixed; inset: 0; overflow: hidden; }
    #video, #overlay { position: absolute; inset: 0; width: 100%; height: 100%; }
    #video { object-fit: cover; background: #000; }
    #overlay { pointer-events: none; }

    #debugStrip {
      position: fixed; bottom: 12px; right: 12px; z-index: 30;
      width: 200px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
      background: rgba(0,0,0,0.6); display: none;
    }
    #debugStrip canvas { display: block; width: 100%; }
    #debugStrip .lbl { font-size: 10px; color: #aaa; padding: 3px 6px; }

    #edgePreview {
      position: fixed; bottom: 12px; right: 220px; z-index: 30;
      width: 140px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
      background: rgba(0,0,0,0.6); display: none;
    }
    #edgePreview canvas { display: block; width: 100%; }
    #edgePreview .lbl { font-size: 10px; color: #aaa; padding: 3px 6px; }

    #startGate {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #111; padding: 24px; text-align: center;
    }
    #startGate h1 { font-size: 24px; margin: 0 0 12px; }
    #startGate p { font-size: 14px; line-height: 1.5; color: #bbb; max-width: 340px; margin: 0 0 20px; }
    #startBtn {
      padding: 16px 28px; font-size: 17px; font-weight: 700;
      border: none; border-radius: 12px; background: #ffcb05; color: #1a1a1a;
    }
    #startBtn:disabled { opacity: 0.6; }

    #status {
      position: fixed; top: 12px; left: 12px; right: 150px; z-index: 20;
      background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 10px;
      font-size: 13px; text-align: center; backdrop-filter: blur(8px);
    }
    #debugToggle {
      position: fixed; top: 12px; right: 12px; z-index: 20;
      background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 10px;
      font-size: 12px; backdrop-filter: blur(8px); border: none; color: white;
    }
    #debugToggle.on { background: rgba(59,130,246,0.9); }
    #detected {
      position: fixed; bottom: 12px; left: 12px; z-index: 20;
      background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 10px;
      font-size: 11px; backdrop-filter: blur(8px);
      font-family: ui-monospace, Menlo, monospace;
      max-width: calc(100% - 380px);
    }
  </style>
</head>
<body>

<div id="startGate">
  <h1>🔮 Pokémon Card AR v8</h1>
  <p>Aggressive binarization for reliable OCR on card names.</p>
  <button id="startBtn">Start Camera</button>
</div>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="edgePreview">
  <div class="lbl">Edges:</div>
  <canvas id="edgeCanvas"></canvas>
</div>

<div id="debugStrip">
  <div class="lbl">OCR input (binarized):</div>
  <canvas id="debugCanvas"></canvas>
</div>

<div id="status" style="display:none;">Initializing…</div>
<button id="debugToggle" style="display:none;">Debug OFF</button>
<div id="detected" style="display:none;">—</div>

<script>
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const ctx = overlay.getContext('2d');
  const startBtn = document.getElementById('startBtn');
  const startGate = document.getElementById('startGate');
  const statusEl = document.getElementById('status');
  const detectedEl = document.getElementById('detected');
  const debugToggle = document.getElementById('debugToggle');
  const debugStrip = document.getElementById('debugStrip');
  const debugCanvas = document.getElementById('debugCanvas');
  const debugCtx = debugCanvas.getContext('2d');
  const edgePreview = document.getElementById('edgePreview');
  const edgeCanvas = document.getElementById('edgeCanvas');
  const edgeCtx = edgeCanvas.getContext('2d');

  const frameCanvas = document.createElement('canvas');
  const frameCtx = frameCanvas.getContext('2d', { willReadFrequently: true });
  const warpCanvas = document.createElement('canvas');  // perspective-corrected top half (color)
  const ocrCanvasA = document.createElement('canvas');  // binarized variant A
  const ocrCanvasB = document.createElement('canvas');  // binarized variant B (inverted)
  const ocrCanvasC = document.createElement('canvas');  // plain grayscale contrast-stretched

  let worker = null;
  let current = null;
  let spriteCache = {};
  let pokemonNameSet = null;
  let ocrRunning = false;
  let detectedQuad = null;
  let ocrQuad = null;
  let debugCandidates = [];
  let debugStats = {};
  let debugMode = false;

  // Smoothing: remember last good quad for a few frames so transient misses don't drop it
  let lastGoodQuad = null;
  let framesSinceGoodQuad = 0;
  const MAX_MISSED_FRAMES = 3;

  debugToggle.addEventListener('click', () => {
    debugMode = !debugMode;
    debugToggle.textContent = debugMode ? 'Debug ON' : 'Debug OFF';
    debugToggle.classList.toggle('on', debugMode);
    edgePreview.style.display = debugMode ? 'block' : 'none';
  });

  async function loadPokemonList() {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');
    const data = await res.json();
    pokemonNameSet = new Set(data.results.map(p => p.name.toLowerCase()));
  }

  function editDistance(a, b) {
    const m = a.length, n = b.length;
    if (!m) return n; if (!n) return m;
    const dp = Array.from({length: m+1}, (_,i)=>[i]);
    for (let j=1;j<=n;j++) dp[0][j]=j;
    for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) {
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1]
              : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
    return dp[m][n];
  }

  function findBestMatch(raw) {
    if (!pokemonNameSet) return null;
    const cleaned = raw.toLowerCase().replace(/[^a-z]/g, '');
    if (cleaned.length < 4) return null;
    if (pokemonNameSet.has(cleaned)) return { name: cleaned, dist: 0 };
    let best = null, bestDist = Infinity;
    const maxDist = Math.max(1, Math.floor(cleaned.length * 0.3));  // slightly more lenient
    for (const name of pokemonNameSet) {
      if (Math.abs(name.length - cleaned.length) > maxDist) continue;
      const d = editDistance(cleaned, name);
      if (d < bestDist) { bestDist = d; best = name; if (d === 0) break; }
    }
    return bestDist <= maxDist ? { name: best, dist: bestDist } : null;
  }

  async function getSpriteFor(name) {
    if (spriteCache[name]) return spriteCache[name];
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => { spriteCache[name] = img; resolve(img); };
      img.onerror = async () => {
        try {
          const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
          const d = await r.json();
          const fb = new Image();
          fb.crossOrigin = 'anonymous';
          fb.onload = () => { spriteCache[name] = fb; resolve(fb); };
          fb.onerror = () => resolve(null);
          fb.src = d.sprites.front_default;
        } catch { resolve(null); }
      };
      img.src = `https://play.pokemonshowdown.com/sprites/ani/${name}.gif`;
    });
  }

  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  function orderQuadCorners(pts) {
    const sums = pts.map(p => p.x + p.y);
    const diffs = pts.map(p => p.x - p.y);
    const tl = pts[sums.indexOf(Math.min(...sums))];
    const br = pts[sums.indexOf(Math.max(...sums))];
    const tr = pts[diffs.indexOf(Math.max(...diffs))];
    const bl = pts[diffs.indexOf(Math.min(...diffs))];
    return [tl, tr, br, bl];
  }

  function polygonArea(pts) {
    let area = 0;
    for (let i = 0; i < pts.length; i++) {
      const j = (i + 1) % pts.length;
      area += pts[i].x * pts[j].y;
      area -= pts[j].x * pts[i].y;
    }
    return Math.abs(area / 2);
  }

  function scoreQuad(quad, frameArea) {
    const [tl, tr, br, bl] = quad;
    const wTop = dist(tl, tr), wBot = dist(bl, br);
    const hLef = dist(tl, bl), hRig = dist(tr, br);
    const avgW = (wTop + wBot) / 2, avgH = (hLef + hRig) / 2;
    if (avgW < 15 || avgH < 15) return null;
    const ratio = avgW / avgH;
    const aspectErr = Math.min(
      Math.abs(ratio - 0.716) / 0.716,
      Math.abs(ratio - 1/0.716) / (1/0.716)
    );
    if (aspectErr > 0.5) return null;

    const qArea = polygonArea(quad);
    const xs = quad.map(p => p.x), ys = quad.map(p => p.y);
    const bboxArea = (Math.max(...xs) - Math.min(...xs)) * (Math.max(...ys) - Math.min(...ys));
    const rectangularity = bboxArea > 0 ? qArea / bboxArea : 0;
    if (rectangularity < 0.55) return null;

    const symTB = Math.min(wTop, wBot) / Math.max(wTop, wBot);
    const symLR = Math.min(hLef, hRig) / Math.max(hLef, hRig);
    if (symTB < 0.5 || symLR < 0.5) return null;

    const areaFrac = qArea / frameArea;
    if (areaFrac < 0.04 || areaFrac > 0.92) return null;

    const sizeScore = 1 - Math.abs(areaFrac - 0.35);
    const score = (1 - aspectErr) * 2.5 + rectangularity * 2.0
                + symTB * 0.6 + symLR * 0.6 + Math.max(0, sizeScore) * 1.0;
    return { score, aspectErr, rectangularity, areaFrac, symTB, symLR };
  }

  function detectCardQuad() {
    if (!window.cv || !window._cvReady) return null;
    const scale = 0.4;
    const w = Math.floor(video.videoWidth * scale);
    const h = Math.floor(video.videoHeight * scale);
    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    tmp.getContext('2d').drawImage(video, 0, 0, w, h);

    const src = cv.imread(tmp);
    const gray = new cv.Mat();
    const blurred = new cv.Mat();
    const edges = new cv.Mat();
    const dilated = new cv.Mat();
    const contours = new cv.MatVector();
    const hierarchy = new cv.Mat();
    const candidates = [];
    const stats = { contoursFound: 0, approxPassed: 0, minAreaRectPassed: 0 };

    try {
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
      const mean = cv.mean(blurred)[0];
      cv.Canny(blurred, edges, Math.max(10, Math.floor(mean * 0.45)), Math.min(255, Math.floor(mean * 1.3)));
      const kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(5, 5));
      cv.dilate(edges, dilated, kernel);
      kernel.delete();

      if (debugMode) {
        edgeCanvas.width = w; edgeCanvas.height = h;
        cv.imshow(edgeCanvas, dilated);
      }

      cv.findContours(dilated, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);
      stats.contoursFound = contours.size();
      const frameArea = w * h;
      const minArea = frameArea * 0.04, maxArea = frameArea * 0.95;

      for (let i = 0; i < contours.size(); i++) {
        const cnt = contours.get(i);
        const area = cv.contourArea(cnt);
        if (area < minArea || area > maxArea) { cnt.delete(); continue; }

        let approxedQuad = null;
        for (const eps of [0.02, 0.03, 0.045, 0.06]) {
          const peri = cv.arcLength(cnt, true);
          const approx = new cv.Mat();
          cv.approxPolyDP(cnt, approx, eps * peri, true);
          if (approx.rows === 4 && cv.isContourConvex(approx)) {
            const pts = [];
            for (let j = 0; j < 4; j++) {
              pts.push({ x: approx.data32S[j*2], y: approx.data32S[j*2+1] });
            }
            approxedQuad = orderQuadCorners(pts);
            stats.approxPassed++;
            approx.delete();
            break;
          }
          approx.delete();
        }
        if (approxedQuad) {
          const s = scoreQuad(approxedQuad, frameArea);
          if (s) candidates.push({ quad: approxedQuad.map(p => ({ x: p.x / scale, y: p.y / scale })), source: 'approx', ...s });
        }

        const rotRect = cv.minAreaRect(cnt);
        const boxPts = cv.RotatedRect.points(rotRect);
        const ordered = orderQuadCorners(boxPts);
        const rectArea = rotRect.size.width * rotRect.size.height;
        const fillRatio = rectArea > 0 ? area / rectArea : 0;
        if (fillRatio >= 0.72) {
          const s = scoreQuad(ordered, frameArea);
          if (s) {
            stats.minAreaRectPassed++;
            candidates.push({
              quad: ordered.map(p => ({ x: p.x / scale, y: p.y / scale })),
              source: `mar(${fillRatio.toFixed(2)})`,
              fillRatio, ...s
            });
          }
        }
        cnt.delete();
      }

      candidates.sort((a, b) => b.score - a.score);
      debugCandidates = candidates.slice(0, 8);
      debugStats = stats;
      return candidates.length > 0 ? candidates[0].quad : null;
    } finally {
      src.delete(); gray.delete(); blurred.delete(); edges.delete();
      dilated.delete(); contours.delete(); hierarchy.delete();
    }
  }

  function computeTopHalfQuad(quad) {
    const [tl, tr, br, bl] = quad;
    const wTop = (dist(tl, tr) + dist(bl, br)) / 2;
    const hLef = (dist(tl, bl) + dist(tr, br)) / 2;
    if (wTop <= hLef) {
      const midL = { x: (tl.x + bl.x) / 2, y: (tl.y + bl.y) / 2 };
      const midR = { x: (tr.x + br.x) / 2, y: (tr.y + br.y) / 2 };
      return [tl, tr, midR, midL];
    } else {
      const leftMidY = (tl.y + bl.y) / 2;
      const rightMidY = (tr.y + br.y) / 2;
      if (leftMidY < rightMidY) {
        const midTop = { x: (tl.x + tr.x) / 2, y: (tl.y + tr.y) / 2 };
        const midBot = { x: (bl.x + br.x) / 2, y: (bl.y + br.y) / 2 };
        return [tl, midTop, midBot, bl];
      } else {
        const midTop = { x: (tl.x + tr.x) / 2, y: (tl.y + tr.y) / 2 };
        const midBot = { x: (bl.x + br.x) / 2, y: (bl.y + br.y) / 2 };
        return [midTop, tr, br, midBot];
      }
    }
  }

  function warpQuadToCanvas(quad, outCanvas, outW, outH) {
    const src = cv.imread(frameCanvas);
    const srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
      quad[0].x, quad[0].y, quad[1].x, quad[1].y,
      quad[2].x, quad[2].y, quad[3].x, quad[3].y
    ]);
    const dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, outW, 0, outW, outH, 0, outH]);
    const M = cv.getPerspectiveTransform(srcPts, dstPts);
    const dst = new cv.Mat();
    cv.warpPerspective(src, dst, M, new cv.Size(outW, outH), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
    outCanvas.width = outW;
    outCanvas.height = outH;
    cv.imshow(outCanvas, dst);
    src.delete(); srcPts.delete(); dstPts.delete(); M.delete(); dst.delete();
  }

  // --- Crop just the NAME band from the warped top-half ---
  // Top half = ~50% of card height. Name is in the upper 30-50% of that, i.e.
  // the upper ~15-25% of the original card. We want just that strip for OCR.
  function cropNameBand(warpedTopHalfCanvas) {
    const w = warpedTopHalfCanvas.width;
    const h = warpedTopHalfCanvas.height;
    // Name band: top 55% vertically, left 70% horizontally (skip HP on right)
    const nameW = Math.floor(w * 0.70);
    const nameH = Math.floor(h * 0.55);
    const nameX = 0;
    const nameY = 0;

    const cropped = document.createElement('canvas');
    cropped.width = nameW;
    cropped.height = nameH;
    cropped.getContext('2d').drawImage(warpedTopHalfCanvas, nameX, nameY, nameW, nameH, 0, 0, nameW, nameH);
    return cropped;
  }

  // --- Produce multiple OCR-ready versions of the name band ---
  // Returns three canvases: Otsu binarized, inverted binarized, contrast-stretched grayscale.
  function makeOCRVariants(nameCanvas) {
    const src = cv.imread(nameCanvas);
    const gray = new cv.Mat();
    const upscaled = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

    // Upscale 3x for better OCR of small text
    const newSize = new cv.Size(gray.cols * 3, gray.rows * 3);
    cv.resize(gray, upscaled, newSize, 0, 0, cv.INTER_CUBIC);

    // Variant A: Otsu's threshold — auto-picks best binarization threshold
    const binA = new cv.Mat();
    cv.threshold(upscaled, binA, 0, 255, cv.THRESH_BINARY + cv.THRESH_OTSU);
    ocrCanvasA.width = binA.cols; ocrCanvasA.height = binA.rows;
    cv.imshow(ocrCanvasA, binA);

    // Variant B: Inverted Otsu (for light text on dark backgrounds)
    const binB = new cv.Mat();
    cv.threshold(upscaled, binB, 0, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);
    ocrCanvasB.width = binB.cols; ocrCanvasB.height = binB.rows;
    cv.imshow(ocrCanvasB, binB);

    // Variant C: Contrast-stretched grayscale (preserves nuance)
    const stretched = new cv.Mat();
    cv.normalize(upscaled, stretched, 0, 255, cv.NORM_MINMAX);
    ocrCanvasC.width = stretched.cols; ocrCanvasC.height = stretched.rows;
    cv.imshow(ocrCanvasC, stretched);

    src.delete(); gray.delete(); upscaled.delete();
    binA.delete(); binB.delete(); stretched.delete();

    return [
      { canvas: ocrCanvasA, label: 'otsu' },
      { canvas: ocrCanvasB, label: 'otsu-inv' },
      { canvas: ocrCanvasC, label: 'stretched' }
    ];
  }

  async function waitForOpenCV() {
    await new Promise(resolve => {
      const check = () => {
        if (window._cvReady && window.cv && cv.Mat) resolve();
        else setTimeout(check, 100);
      };
      check();
    });
    if (cv instanceof Promise) await cv;
  }

  async function start() {
    startBtn.disabled = true;
    startBtn.textContent = 'Starting…';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();

      startGate.style.display = 'none';
      statusEl.style.display = 'block';
      detectedEl.style.display = 'block';
      debugStrip.style.display = 'block';
      debugToggle.style.display = 'block';

      statusEl.textContent = 'Loading OpenCV + OCR…';
      await waitForOpenCV();
      await loadPokemonList();

      worker = await Tesseract.createWorker('eng');
      // PSM 7 = single line of text. Much better for card names than default.
      await worker.setParameters({
        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz ',
        tessedit_pageseg_mode: '7'
      });

      statusEl.textContent = 'Ready — show me a card 🎯';
      resizeOverlay();
      window.addEventListener('resize', resizeOverlay);
      requestAnimationFrame(renderLoop);
      setInterval(processFrame, 700);
    } catch (e) {
      alert('Failed: ' + e.message);
      startBtn.disabled = false;
      startBtn.textContent = 'Start Camera';
    }
  }

  function resizeOverlay() {
    overlay.width = overlay.clientWidth * window.devicePixelRatio;
    overlay.height = overlay.clientHeight * window.devicePixelRatio;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }

  async function processFrame() {
    if (ocrRunning || !worker || !video.videoWidth) return;
    ocrRunning = true;
    try {
      frameCanvas.width = video.videoWidth;
      frameCanvas.height = video.videoHeight;
      frameCtx.drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);

      let quad = detectCardQuad();

      // Temporal smoothing: if we miss a frame but had a good quad recently, use it
      if (quad) {
        lastGoodQuad = quad;
        framesSinceGoodQuad = 0;
      } else if (lastGoodQuad && framesSinceGoodQuad < MAX_MISSED_FRAMES) {
        quad = lastGoodQuad;
        framesSinceGoodQuad++;
      } else {
        lastGoodQuad = null;
      }

      if (!quad) {
        detectedQuad = null;
        ocrQuad = null;
        const s = debugStats;
        detectedEl.textContent = `no quad | contours=${s.contoursFound} ap=${s.approxPassed} mar=${s.minAreaRectPassed}`;
        return;
      }

      detectedQuad = quad;
      const topHalf = computeTopHalfQuad(quad);
      ocrQuad = topHalf;

      // Warp top half to a flat canvas
      warpQuadToCanvas(topHalf, warpCanvas, 600, 220);
      // Crop to just the name band
      const nameBand = cropNameBand(warpCanvas);
      // Build 3 OCR-ready variants
      const variants = makeOCRVariants(nameBand);

      // Run OCR on all variants, collect matches
      let best = null;
      let rawReads = [];
      for (const v of variants) {
        const { data } = await worker.recognize(v.canvas);
        const text = (data.text || '').trim();
        rawReads.push(`${v.label}:"${text}"`);
        // First try the whole line as a single token
        const m = findBestMatch(text);
        if (m && (!best || m.dist < best.match.dist)) {
          best = { match: m, raw: text, variant: v.label, conf: data.confidence || 0 };
        }
        // Also scan individual words (in case there are multiple)
        for (const w of (data.words || [])) {
          if (!w.text || w.confidence < 30) continue;
          const mm = findBestMatch(w.text);
          if (mm && (!best || mm.dist < best.match.dist)) {
            best = { match: mm, raw: w.text, variant: v.label, conf: w.confidence };
          }
        }
      }

      // Show the best-looking variant in the debug preview
      const showVariant = variants.find(v => v.label === (best?.variant || 'otsu'));
      debugCanvas.width = showVariant.canvas.width;
      debugCanvas.height = showVariant.canvas.height;
      debugCtx.drawImage(showVariant.canvas, 0, 0);

      if (best) {
        if (!current || current.name !== best.match.name) {
          statusEl.textContent = `✓ ${best.match.name}`;
          const img = await getSpriteFor(best.match.name);
          current = { name: best.match.name, img, quad: detectedQuad, lastSeen: Date.now() };
        } else {
          current.quad = detectedQuad;
          current.lastSeen = Date.now();
        }
        detectedEl.textContent = `${best.match.name} | "${best.raw}" [${best.variant} d=${best.match.dist}]`;
      } else {
        detectedEl.textContent = `card found | ${rawReads.join(' ')}`;
        if (current) current.quad = detectedQuad;
      }
    } catch (e) {
      console.error(e);
    } finally {
      ocrRunning = false;
    }
  }

  function drawQuad(quad, strokeStyle, lineWidth, toScreen) {
    ctx.save();
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = lineWidth;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    const p0 = toScreen(quad[0].x, quad[0].y);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < 4; i++) {
      const p = toScreen(quad[i].x, quad[i].y);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function renderLoop() {
    const w = overlay.clientWidth, h = overlay.clientHeight;
    ctx.clearRect(0, 0, w, h);
    if (!video.videoWidth) { requestAnimationFrame(renderLoop); return; }

    const vAspect = video.videoWidth / video.videoHeight;
    const dAspect = w / h;
    let dispW, dispH, offX, offY;
    if (vAspect > dAspect) {
      dispH = h; dispW = dispH * vAspect;
      offX = (w - dispW) / 2; offY = 0;
    } else {
      dispW = w; dispH = dispW / vAspect;
      offX = 0; offY = (h - dispH) / 2;
    }
    const toScreen = (x, y) => ({ x: offX + x * (dispW / video.videoWidth), y: offY + y * (dispH / video.videoHeight) });

    if (debugMode) {
      for (let i = 0; i < debugCandidates.length; i++) {
        const c = debugCandidates[i];
        const alpha = 0.35 + 0.55 * (1 - i / debugCandidates.length);
        drawQuad(c.quad, `rgba(255,100,255,${alpha})`, 1.5, toScreen);
      }
    }

    if (detectedQuad) drawQuad(detectedQuad, 'rgba(255,203,5,0.95)', 6, toScreen);
    if (ocrQuad) drawQuad(ocrQuad, 'rgba(59,130,246,0.95)', 4, toScreen);

    if (current && current.img) {
      let anchorX, anchorY, cardScreenH;
      if (current.quad && detectedQuad) {
        const top = computeTopHalfQuad(current.quad);
        const tl = toScreen(top[0].x, top[0].y);
        const tr = toScreen(top[1].x, top[1].y);
        anchorX = (tl.x + tr.x) / 2;
        anchorY = (tl.y + tr.y) / 2;
        const bl = toScreen(top[3].x, top[3].y);
        const br = toScreen(top[2].x, top[2].y);
        const topHalfH = Math.hypot(((bl.x + br.x) / 2) - anchorX, ((bl.y + br.y) / 2) - anchorY);
        cardScreenH = topHalfH * 2;
        current.lastAnchor = { x: anchorX, y: anchorY, cardScreenH };
      } else if (current.lastAnchor) {
        anchorX = current.lastAnchor.x;
        anchorY = current.lastAnchor.y;
        cardScreenH = current.lastAnchor.cardScreenH;
      } else {
        anchorX = w / 2; anchorY = h / 2; cardScreenH = 300;
      }

      const spriteH = Math.max(140, cardScreenH * 0.75);
      const spriteW = spriteH;
      let spriteX = anchorX - spriteW / 2;
      let spriteY = anchorY - spriteH - 8;
      if (spriteY < 40) spriteY = anchorY + 8;

      if (detectedQuad) {
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(anchorX, anchorY, spriteW * 0.3, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      const bob = Math.sin(Date.now() / 400) * 4;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(current.img, spriteX, spriteY + bob, spriteW, spriteH);
    }

    requestAnimationFrame(renderLoop);
  }

  startBtn.addEventListener('click', start);
</script>

</body>
</html>
