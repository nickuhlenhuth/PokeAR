<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Pokémon Card AR v6</title>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="window._cvReady=true"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
                 font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: white; }

    #stage { position: fixed; inset: 0; overflow: hidden; }
    #video, #overlay { position: absolute; inset: 0; width: 100%; height: 100%; }
    #video { object-fit: cover; background: #000; }
    #overlay { pointer-events: none; }

    #debugStrip {
      position: fixed; bottom: 12px; right: 12px; z-index: 30;
      width: 180px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
      background: rgba(0,0,0,0.6); display: none;
    }
    #debugStrip canvas { display: block; width: 100%; }
    #debugStrip .lbl { font-size: 10px; color: #aaa; padding: 3px 6px; }

    #startGate {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #111; padding: 24px; text-align: center;
    }
    #startGate h1 { font-size: 24px; margin: 0 0 12px; }
    #startGate p { font-size: 14px; line-height: 1.5; color: #bbb; max-width: 340px; margin: 0 0 20px; }
    #startBtn {
      padding: 16px 28px; font-size: 17px; font-weight: 700;
      border: none; border-radius: 12px; background: #ffcb05; color: #1a1a1a;
    }
    #startBtn:disabled { opacity: 0.6; }

    #status {
      position: fixed; top: 12px; left: 12px; right: 150px; z-index: 20;
      background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 10px;
      font-size: 13px; text-align: center; backdrop-filter: blur(8px);
    }
    #debugToggle {
      position: fixed; top: 12px; right: 12px; z-index: 20;
      background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 10px;
      font-size: 12px; backdrop-filter: blur(8px); border: none; color: white;
    }
    #debugToggle.on { background: rgba(59,130,246,0.9); }
    #detected {
      position: fixed; bottom: 12px; left: 12px; z-index: 20;
      background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 10px;
      font-size: 11px; backdrop-filter: blur(8px);
      font-family: ui-monospace, Menlo, monospace;
      max-width: calc(100% - 210px);
    }
  </style>
</head>
<body>

<div id="startGate">
  <h1>🔮 Pokémon Card AR</h1>
  <p>Hold a card in view. Yellow traces the card, blue shows the OCR region.</p>
  <button id="startBtn">Start Camera</button>
</div>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="debugStrip">
  <div class="lbl">OCR view (top half of card):</div>
  <canvas id="debugCanvas"></canvas>
</div>

<div id="status" style="display:none;">Initializing…</div>
<button id="debugToggle" style="display:none;">Debug OFF</button>
<div id="detected" style="display:none;">—</div>

<script>
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const ctx = overlay.getContext('2d');
  const startBtn = document.getElementById('startBtn');
  const startGate = document.getElementById('startGate');
  const statusEl = document.getElementById('status');
  const detectedEl = document.getElementById('detected');
  const debugToggle = document.getElementById('debugToggle');
  const debugStrip = document.getElementById('debugStrip');
  const debugCanvas = document.getElementById('debugCanvas');
  const debugCtx = debugCanvas.getContext('2d');

  const frameCanvas = document.createElement('canvas');
  const frameCtx = frameCanvas.getContext('2d', { willReadFrequently: true });
  const ocrCanvas = document.createElement('canvas');
  const ocrCtx = ocrCanvas.getContext('2d');

  let worker = null;
  let current = null;
  let spriteCache = {};
  let pokemonNameSet = null;
  let ocrRunning = false;
  let detectedQuad = null;
  let ocrQuad = null;
  let debugCandidates = [];     // all scored quad candidates (for debug overlay)
  let debugMode = false;

  debugToggle.addEventListener('click', () => {
    debugMode = !debugMode;
    debugToggle.textContent = debugMode ? 'Debug ON' : 'Debug OFF';
    debugToggle.classList.toggle('on', debugMode);
  });

  async function loadPokemonList() {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');
    const data = await res.json();
    pokemonNameSet = new Set(data.results.map(p => p.name.toLowerCase()));
  }

  function editDistance(a, b) {
    const m = a.length, n = b.length;
    if (!m) return n; if (!n) return m;
    const dp = Array.from({length: m+1}, (_,i)=>[i]);
    for (let j=1;j<=n;j++) dp[0][j]=j;
    for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) {
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1]
              : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
    return dp[m][n];
  }

  function findBestMatch(raw) {
    if (!pokemonNameSet) return null;
    const cleaned = raw.toLowerCase().replace(/[^a-z]/g, '');
    if (cleaned.length < 4) return null;
    if (pokemonNameSet.has(cleaned)) return { name: cleaned, dist: 0 };
    let best = null, bestDist = Infinity;
    const maxDist = Math.max(1, Math.floor(cleaned.length * 0.25));
    for (const name of pokemonNameSet) {
      if (Math.abs(name.length - cleaned.length) > maxDist) continue;
      const d = editDistance(cleaned, name);
      if (d < bestDist) { bestDist = d; best = name; if (d === 0) break; }
    }
    return bestDist <= maxDist ? { name: best, dist: bestDist } : null;
  }

  async function getSpriteFor(name) {
    if (spriteCache[name]) return spriteCache[name];
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => { spriteCache[name] = img; resolve(img); };
      img.onerror = async () => {
        try {
          const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
          const d = await r.json();
          const fb = new Image();
          fb.crossOrigin = 'anonymous';
          fb.onload = () => { spriteCache[name] = fb; resolve(fb); };
          fb.onerror = () => resolve(null);
          fb.src = d.sprites.front_default;
        } catch { resolve(null); }
      };
      img.src = `https://play.pokemonshowdown.com/sprites/ani/${name}.gif`;
    });
  }

  function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  function orderQuadCorners(pts) {
    const sums = pts.map(p => p.x + p.y);
    const diffs = pts.map(p => p.x - p.y);
    const tl = pts[sums.indexOf(Math.min(...sums))];
    const br = pts[sums.indexOf(Math.max(...sums))];
    const tr = pts[diffs.indexOf(Math.max(...diffs))];
    const bl = pts[diffs.indexOf(Math.min(...diffs))];
    return [tl, tr, br, bl];
  }

  // --- Improved card detector with scoring ---
  // We score each candidate quad by:
  //   - rectangularity (contour area / bounding rect area)
  //   - aspect ratio closeness to 0.716 (or 1/0.716)
  //   - relative size (prefer middle-large, not tiny or whole frame)
  // Also, we use RETR_LIST so we see nested contours, and we run Canny with
  // adaptive thresholds based on image statistics.
  function detectCardQuad() {
    if (!window.cv || !window._cvReady) return null;
    const scale = 0.4;
    const w = Math.floor(video.videoWidth * scale);
    const h = Math.floor(video.videoHeight * scale);
    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    tmp.getContext('2d').drawImage(video, 0, 0, w, h);

    const src = cv.imread(tmp);
    const gray = new cv.Mat();
    const blurred = new cv.Mat();
    const edges = new cv.Mat();
    const dilated = new cv.Mat();
    const contours = new cv.MatVector();
    const hierarchy = new cv.Mat();

    const candidates = [];

    try {
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);

      // Adaptive Canny thresholds from median of blurred image
      const mean = cv.mean(blurred)[0];
      const lo = Math.max(0, Math.floor(mean * 0.5));
      const hi = Math.min(255, Math.floor(mean * 1.2));
      cv.Canny(blurred, edges, lo, hi);

      const kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
      cv.dilate(edges, dilated, kernel);
      kernel.delete();

      // RETR_LIST so we pick up nested contours (the card inside a sleeve
      // can be nested in the sleeve's outer contour).
      cv.findContours(dilated, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

      const frameArea = w * h;
      const minArea = frameArea * 0.05;
      const maxArea = frameArea * 0.90;

      for (let i = 0; i < contours.size(); i++) {
        const cnt = contours.get(i);
        const area = cv.contourArea(cnt);
        if (area < minArea || area > maxArea) { cnt.delete(); continue; }

        // Try multiple epsilon values — some quads need a looser approx
        for (const eps of [0.015, 0.025, 0.04]) {
          const peri = cv.arcLength(cnt, true);
          const approx = new cv.Mat();
          cv.approxPolyDP(cnt, approx, eps * peri, true);

          if (approx.rows === 4 && cv.isContourConvex(approx)) {
            const pts = [];
            for (let j = 0; j < 4; j++) {
              pts.push({ x: approx.data32S[j*2], y: approx.data32S[j*2+1] });
            }
            const ordered = orderQuadCorners(pts);
            const wTop = dist(ordered[0], ordered[1]);
            const wBot = dist(ordered[3], ordered[2]);
            const hLef = dist(ordered[0], ordered[3]);
            const hRig = dist(ordered[1], ordered[2]);
            const avgW = (wTop + wBot) / 2;
            const avgH = (hLef + hRig) / 2;
            const ratio = avgW / avgH;

            // Reject degenerate shapes
            if (avgW < 20 || avgH < 20) { approx.delete(); continue; }

            // Aspect ratio score — how close to portrait 0.716 or landscape 1.395
            const targetPortrait = 0.716;
            const targetLandscape = 1 / 0.716;
            const distPortrait = Math.abs(ratio - targetPortrait) / targetPortrait;
            const distLandscape = Math.abs(ratio - targetLandscape) / targetLandscape;
            const aspectErr = Math.min(distPortrait, distLandscape);
            if (aspectErr > 0.45) { approx.delete(); continue; }  // too non-card-shaped

            // Rectangularity: quad area vs. its axis-aligned bounding rect area
            // For a true rectangle (no perspective), this is ~1.0. With perspective it
            // can be lower but a convex quad should still be > 0.6 or so.
            const quadArea = Math.abs(
              (ordered[0].x * (ordered[1].y - ordered[3].y) +
               ordered[1].x * (ordered[2].y - ordered[0].y) +
               ordered[2].x * (ordered[3].y - ordered[1].y) +
               ordered[3].x * (ordered[0].y - ordered[2].y)) / 2
            );
            const xs = ordered.map(p => p.x), ys = ordered.map(p => p.y);
            const bboxArea = (Math.max(...xs) - Math.min(...xs)) * (Math.max(...ys) - Math.min(...ys));
            const rectangularity = bboxArea > 0 ? quadArea / bboxArea : 0;
            if (rectangularity < 0.60) { approx.delete(); continue; }

            // Side-pair symmetry: opposite sides should be similar length
            const symTopBot = Math.min(wTop, wBot) / Math.max(wTop, wBot);
            const symLefRig = Math.min(hLef, hRig) / Math.max(hLef, hRig);
            if (symTopBot < 0.55 || symLefRig < 0.55) { approx.delete(); continue; }

            // Size preference: favor ~30% of frame, penalize too small or too huge
            const areaFrac = quadArea / frameArea;
            const sizeScore = 1 - Math.abs(areaFrac - 0.30);  // 1.0 when 30%, lower otherwise

            // Combined score (higher is better)
            const score = (1 - aspectErr) * 2.0
                        + rectangularity * 1.5
                        + symTopBot * 0.5
                        + symLefRig * 0.5
                        + Math.max(0, sizeScore) * 1.0;

            candidates.push({
              quad: ordered.map(p => ({ x: p.x / scale, y: p.y / scale })),
              score,
              aspectErr,
              rectangularity,
              areaFrac,
              epsUsed: eps
            });
            approx.delete();
            break;  // take first successful eps for this contour
          }
          approx.delete();
        }
        cnt.delete();
      }

      // Sort by score desc
      candidates.sort((a, b) => b.score - a.score);
      debugCandidates = candidates.slice(0, 8);
      return candidates.length > 0 ? candidates[0].quad : null;
    } finally {
      src.delete(); gray.delete(); blurred.delete(); edges.delete();
      dilated.delete(); contours.delete(); hierarchy.delete();
    }
  }

  function computeTopHalfQuad(quad) {
    const [tl, tr, br, bl] = quad;
    const wTop = (dist(tl, tr) + dist(bl, br)) / 2;
    const hLef = (dist(tl, bl) + dist(tr, br)) / 2;
    if (wTop <= hLef) {
      const midL = { x: (tl.x + bl.x) / 2, y: (tl.y + bl.y) / 2 };
      const midR = { x: (tr.x + br.x) / 2, y: (tr.y + br.y) / 2 };
      return [tl, tr, midR, midL];
    } else {
      const leftMidY = (tl.y + bl.y) / 2;
      const rightMidY = (tr.y + br.y) / 2;
      if (leftMidY < rightMidY) {
        const midTop = { x: (tl.x + tr.x) / 2, y: (tl.y + tr.y) / 2 };
        const midBot = { x: (bl.x + br.x) / 2, y: (bl.y + br.y) / 2 };
        return [tl, midTop, midBot, bl];
      } else {
        const midTop = { x: (tl.x + tr.x) / 2, y: (tl.y + tr.y) / 2 };
        const midBot = { x: (bl.x + br.x) / 2, y: (bl.y + br.y) / 2 };
        return [midTop, tr, br, midBot];
      }
    }
  }

  function warpQuadToCanvas(quad, outCanvas, outW, outH) {
    const src = cv.imread(frameCanvas);
    const srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
      quad[0].x, quad[0].y,
      quad[1].x, quad[1].y,
      quad[2].x, quad[2].y,
      quad[3].x, quad[3].y
    ]);
    const dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
      0, 0,
      outW, 0,
      outW, outH,
      0, outH
    ]);
    const M = cv.getPerspectiveTransform(srcPts, dstPts);
    const dst = new cv.Mat();
    cv.warpPerspective(src, dst, M, new cv.Size(outW, outH), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
    outCanvas.width = outW;
    outCanvas.height = outH;
    cv.imshow(outCanvas, dst);
    src.delete(); srcPts.delete(); dstPts.delete(); M.delete(); dst.delete();
  }

  async function waitForOpenCV() {
    await new Promise(resolve => {
      const check = () => {
        if (window._cvReady && window.cv && cv.Mat) resolve();
        else setTimeout(check, 100);
      };
      check();
    });
    if (cv instanceof Promise) await cv;
  }

  async function start() {
    startBtn.disabled = true;
    startBtn.textContent = 'Starting…';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();

      startGate.style.display = 'none';
      statusEl.style.display = 'block';
      detectedEl.style.display = 'block';
      debugStrip.style.display = 'block';
      debugToggle.style.display = 'block';

      statusEl.textContent = 'Loading OpenCV + OCR…';
      await waitForOpenCV();
      await loadPokemonList();

      worker = await Tesseract.createWorker('eng');
      await worker.setParameters({
        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz '
      });

      statusEl.textContent = 'Ready — show me a card 🎯';
      resizeOverlay();
      window.addEventListener('resize', resizeOverlay);
      requestAnimationFrame(renderLoop);
      setInterval(processFrame, 600);
    } catch (e) {
      alert('Failed: ' + e.message);
      startBtn.disabled = false;
      startBtn.textContent = 'Start Camera';
    }
  }

  function resizeOverlay() {
    overlay.width = overlay.clientWidth * window.devicePixelRatio;
    overlay.height = overlay.clientHeight * window.devicePixelRatio;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }

  async function processFrame() {
    if (ocrRunning || !worker || !video.videoWidth) return;
    ocrRunning = true;
    try {
      frameCanvas.width = video.videoWidth;
      frameCanvas.height = video.videoHeight;
      frameCtx.drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);

      const quad = detectCardQuad();

      if (!quad) {
        detectedQuad = null;
        ocrQuad = null;
        detectedEl.textContent = 'No card detected';
        return;
      }

      detectedQuad = quad;
      const topHalf = computeTopHalfQuad(quad);
      ocrQuad = topHalf;

      const outW = 600;
      const outH = 220;
      warpQuadToCanvas(topHalf, ocrCanvas, outW, outH);

      const imgData = ocrCtx.getImageData(0, 0, outW, outH);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const l = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
        const boosted = l < 128 ? Math.max(0, l - 15) : Math.min(255, l + 15);
        d[i] = d[i+1] = d[i+2] = boosted;
      }
      ocrCtx.putImageData(imgData, 0, 0);

      debugCanvas.width = outW;
      debugCanvas.height = outH;
      debugCtx.drawImage(ocrCanvas, 0, 0);

      const { data } = await worker.recognize(ocrCanvas);
      const words = (data.words || []).filter(w => w.confidence > 40);

      let best = null;
      for (const w of words) {
        if (!w.text) continue;
        const m = findBestMatch(w.text);
        if (m && (!best || m.dist < best.match.dist || (m.dist === best.match.dist && w.confidence > best.conf))) {
          best = { match: m, word: w, conf: w.confidence };
        }
      }

      if (best) {
        if (!current || current.name !== best.match.name) {
          statusEl.textContent = `✓ ${best.match.name}`;
          const img = await getSpriteFor(best.match.name);
          current = { name: best.match.name, img, quad: detectedQuad, lastSeen: Date.now() };
        } else {
          current.quad = detectedQuad;
          current.lastSeen = Date.now();
        }
        detectedEl.textContent = `${best.match.name} | raw="${best.word.text}" conf=${Math.round(best.conf)}`;
      } else {
        detectedEl.textContent = `card found | no match: ${words.slice(0,4).map(w=>w.text).join(', ')}`;
        if (current) current.quad = detectedQuad;
      }
    } catch (e) {
      console.error(e);
    } finally {
      ocrRunning = false;
    }
  }

  function drawQuad(quad, strokeStyle, lineWidth, toScreen) {
    ctx.save();
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = lineWidth;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    const p0 = toScreen(quad[0].x, quad[0].y);
    ctx.moveTo(p0.x, p0.y);
    for (let i = 1; i < 4; i++) {
      const p = toScreen(quad[i].x, quad[i].y);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function renderLoop() {
    const w = overlay.clientWidth, h = overlay.clientHeight;
    ctx.clearRect(0, 0, w, h);
    if (!video.videoWidth) { requestAnimationFrame(renderLoop); return; }

    const vAspect = video.videoWidth / video.videoHeight;
    const dAspect = w / h;
    let dispW, dispH, offX, offY;
    if (vAspect > dAspect) {
      dispH = h; dispW = dispH * vAspect;
      offX = (w - dispW) / 2; offY = 0;
    } else {
      dispW = w; dispH = dispW / vAspect;
      offX = 0; offY = (h - dispH) / 2;
    }
    const toScreen = (x, y) => ({ x: offX + x * (dispW / video.videoWidth), y: offY + y * (dispH / video.videoHeight) });

    // In debug mode, show ALL candidates with scores
    if (debugMode) {
      for (let i = 0; i < debugCandidates.length; i++) {
        const c = debugCandidates[i];
        const alpha = 0.3 + 0.7 * (1 - i / debugCandidates.length);
        drawQuad(c.quad, `rgba(255,100,255,${alpha})`, 1.5, toScreen);
        // Label with score
        const center = toScreen(
          (c.quad[0].x + c.quad[2].x) / 2,
          (c.quad[0].y + c.quad[2].y) / 2
        );
        ctx.save();
        ctx.fillStyle = `rgba(255,100,255,${alpha})`;
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`#${i+1} s=${c.score.toFixed(2)}`, center.x, center.y);
        ctx.restore();
      }
    }

    if (detectedQuad) {
      drawQuad(detectedQuad, 'rgba(255,203,5,0.95)', 6, toScreen);
    }
    if (ocrQuad) {
      drawQuad(ocrQuad, 'rgba(59,130,246,0.95)', 4, toScreen);
    }

    // Sprite
    if (current && current.img) {
      let anchorX, anchorY, cardScreenH;

      if (current.quad && detectedQuad) {
        const top = computeTopHalfQuad(current.quad);
        const tl = toScreen(top[0].x, top[0].y);
        const tr = toScreen(top[1].x, top[1].y);
        anchorX = (tl.x + tr.x) / 2;
        anchorY = (tl.y + tr.y) / 2;
        const bl = toScreen(top[3].x, top[3].y);
        const br = toScreen(top[2].x, top[2].y);
        const topHalfH = Math.hypot(((bl.x + br.x) / 2) - anchorX, ((bl.y + br.y) / 2) - anchorY);
        cardScreenH = topHalfH * 2;
        current.lastAnchor = { x: anchorX, y: anchorY, cardScreenH };
      } else if (current.lastAnchor) {
        anchorX = current.lastAnchor.x;
        anchorY = current.lastAnchor.y;
        cardScreenH = current.lastAnchor.cardScreenH;
      } else {
        anchorX = w / 2;
        anchorY = h / 2;
        cardScreenH = 300;
      }

      const spriteH = Math.max(140, cardScreenH * 0.75);
      const spriteW = spriteH;
      let spriteX = anchorX - spriteW / 2;
      let spriteY = anchorY - spriteH - 8;
      if (spriteY < 40) spriteY = anchorY + 8;

      if (detectedQuad) {
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(anchorX, anchorY, spriteW * 0.3, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      const bob = Math.sin(Date.now() / 400) * 4;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(current.img, spriteX, spriteY + bob, spriteW, spriteH);
    }

    requestAnimationFrame(renderLoop);
  }

  startBtn.addEventListener('click', start);
</script>

</body>
</html>
