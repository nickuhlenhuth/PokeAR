<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Pokémon Card AR</title>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000; color: white;
    }

    #stage { position: fixed; inset: 0; overflow: hidden; }
    #video, #overlay {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    #video { object-fit: cover; background: #000; }
    #overlay { pointer-events: none; }

    #debugPanel {
      position: fixed; bottom: 12px; right: 12px; z-index: 30;
      width: 180px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
      background: rgba(0,0,0,0.65); display: none;
    }
    #debugPanel canvas { display: block; width: 100%; }
    #debugPanel .lbl { font-size: 10px; color: #aaa; padding: 3px 6px; }

    #startGate {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #111; padding: 24px; text-align: center;
    }
    #startGate h1 { font-size: 26px; margin: 0 0 12px; }
    #startGate p { font-size: 14px; line-height: 1.5; color: #bbb; max-width: 340px; margin: 0 0 20px; }
    #startBtn {
      padding: 16px 32px; font-size: 17px; font-weight: 700;
      border: none; border-radius: 12px; background: #ffcb05; color: #1a1a1a;
    }
    #startBtn:disabled { opacity: 0.6; }

    #status {
      position: fixed; top: 12px; left: 12px; right: 12px; z-index: 20;
      background: rgba(0,0,0,0.65); padding: 10px 14px; border-radius: 10px;
      font-size: 13px; text-align: center; backdrop-filter: blur(8px);
    }
    #detected {
      position: fixed; bottom: 12px; left: 12px; z-index: 20;
      background: rgba(0,0,0,0.65); padding: 8px 12px; border-radius: 10px;
      font-size: 11px; backdrop-filter: blur(8px);
      font-family: ui-monospace, Menlo, monospace;
      max-width: calc(100% - 210px);
    }
  </style>
</head>
<body>

<div id="startGate">
  <h1>🔮 Pokémon Card AR</h1>
  <p>Align your card inside the dashed frame, hold steady, and watch it come alive.</p>
  <button id="startBtn">Start Camera</button>
</div>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="debugPanel">
  <div class="lbl">Name region OCR:</div>
  <canvas id="debugCanvas"></canvas>
</div>

<div id="status" style="display:none;">Initializing…</div>
<div id="detected" style="display:none;">—</div>

<script>
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const ctx = overlay.getContext('2d');
  const startBtn = document.getElementById('startBtn');
  const startGate = document.getElementById('startGate');
  const statusEl = document.getElementById('status');
  const detectedEl = document.getElementById('detected');
  const debugPanel = document.getElementById('debugPanel');
  const debugCanvas = document.getElementById('debugCanvas');
  const debugCtx = debugCanvas.getContext('2d');

  // Hidden working canvases
  const grabCanvas = document.createElement('canvas');
  const grabCtx = grabCanvas.getContext('2d', { willReadFrequently: true });
  const nameCanvas = document.createElement('canvas');
  const nameCtx = nameCanvas.getContext('2d');

  let worker = null;
  let current = null;              // { name, img }
  let spriteCache = {};
  let pokemonNameSet = null;
  let ocrRunning = false;
  let pulsePhase = 0;

  // --- Load Pokémon list ---
  async function loadPokemonList() {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000');
    const data = await res.json();
    pokemonNameSet = new Set(data.results.map(p => p.name.toLowerCase()));
  }

  function editDistance(a, b) {
    const m = a.length, n = b.length;
    if (!m) return n; if (!n) return m;
    const dp = Array.from({length: m+1}, (_,i)=>[i]);
    for (let j=1;j<=n;j++) dp[0][j]=j;
    for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) {
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1]
              : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
    return dp[m][n];
  }

  function findBestMatch(raw) {
    if (!pokemonNameSet) return null;
    const cleaned = raw.toLowerCase().replace(/[^a-z]/g, '');
    if (cleaned.length < 4) return null;
    if (pokemonNameSet.has(cleaned)) return { name: cleaned, dist: 0 };
    let best = null, bestDist = Infinity;
    const maxDist = Math.max(1, Math.floor(cleaned.length * 0.3));
    for (const name of pokemonNameSet) {
      if (Math.abs(name.length - cleaned.length) > maxDist) continue;
      const d = editDistance(cleaned, name);
      if (d < bestDist) { bestDist = d; best = name; if (d === 0) break; }
    }
    return bestDist <= maxDist ? { name: best, dist: bestDist } : null;
  }

  async function getSpriteFor(name) {
    if (spriteCache[name]) return spriteCache[name];
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => { spriteCache[name] = img; resolve(img); };
      img.onerror = async () => {
        try {
          const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
          const d = await r.json();
          const fb = new Image();
          fb.crossOrigin = 'anonymous';
          fb.onload = () => { spriteCache[name] = fb; resolve(fb); };
          fb.onerror = () => resolve(null);
          fb.src = d.sprites.front_default;
        } catch { resolve(null); }
      };
      img.src = `https://play.pokemonshowdown.com/sprites/ani/${name}.gif`;
    });
  }

  // --- Geometry of the target zone ---
  // A portrait card-shaped box centered on screen, using 0.716 aspect ratio (Pokémon card spec).
  // We compute this in CSS pixels (on the screen), and separately translate to video coords for cropping.
  function getTargetBox() {
    const W = overlay.clientWidth;
    const H = overlay.clientHeight;
    // Card takes up ~65% of the shorter viewport dimension in height
    const cardH = Math.min(H * 0.65, W * 0.65 / 0.716);
    const cardW = cardH * 0.716;
    const cx = W / 2, cy = H / 2;
    return {
      x: cx - cardW / 2,
      y: cy - cardH / 2,
      w: cardW,
      h: cardH
    };
  }

  // Maps a CSS-pixel rect on the screen to a pixel rect in the raw video frame,
  // accounting for object-fit: cover.
  function screenRectToVideo(rect) {
    const W = overlay.clientWidth, H = overlay.clientHeight;
    const vAspect = video.videoWidth / video.videoHeight;
    const dAspect = W / H;
    let dispW, dispH, offX, offY;
    if (vAspect > dAspect) {
      dispH = H; dispW = dispH * vAspect;
      offX = (W - dispW) / 2; offY = 0;
    } else {
      dispW = W; dispH = dispW / vAspect;
      offX = 0; offY = (H - dispH) / 2;
    }
    const sx = video.videoWidth / dispW;
    const sy = video.videoHeight / dispH;
    return {
      x: (rect.x - offX) * sx,
      y: (rect.y - offY) * sy,
      w: rect.w * sx,
      h: rect.h * sy
    };
  }

  // --- Start ---
  async function start() {
    startBtn.disabled = true;
    startBtn.textContent = 'Starting…';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });
      video.srcObject = stream;
      await video.play();

      startGate.style.display = 'none';
      statusEl.style.display = 'block';
      detectedEl.style.display = 'block';
      debugPanel.style.display = 'block';

      statusEl.textContent = 'Loading OCR (first time ~5s)…';
      await loadPokemonList();

      worker = await Tesseract.createWorker('eng');
      await worker.setParameters({
        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz ',
        tessedit_pageseg_mode: '7'  // single line
      });

      statusEl.textContent = 'Align your card with the dashed frame 🎯';
      resizeOverlay();
      window.addEventListener('resize', resizeOverlay);
      requestAnimationFrame(renderLoop);
      setInterval(runOCR, 700);
    } catch (e) {
      alert('Failed to start: ' + e.message);
      startBtn.disabled = false;
      startBtn.textContent = 'Start Camera';
    }
  }

  function resizeOverlay() {
    overlay.width = overlay.clientWidth * window.devicePixelRatio;
    overlay.height = overlay.clientHeight * window.devicePixelRatio;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }

  // --- Periodic OCR pass on the fixed target zone's name band ---
  async function runOCR() {
    if (ocrRunning || !worker || !video.videoWidth) return;
    ocrRunning = true;
    try {
      // Target card in screen coords, then translate to video coords
      const targetScreen = getTargetBox();
      const targetVideo = screenRectToVideo(targetScreen);

      // Clamp to actual video bounds
      const vx = Math.max(0, targetVideo.x);
      const vy = Math.max(0, targetVideo.y);
      const vw = Math.min(video.videoWidth - vx, targetVideo.w);
      const vh = Math.min(video.videoHeight - vy, targetVideo.h);
      if (vw < 50 || vh < 50) { ocrRunning = false; return; }

      // Name band = top ~13% of the card, left ~72% (skip HP area on right)
      const nameX = vx + vw * 0.03;
      const nameY = vy + vh * 0.03;
      const nameW = vw * 0.72;
      const nameH = vh * 0.13;

      // Grab to working canvas at 3x upscale
      const upscale = 3;
      nameCanvas.width = Math.floor(nameW * upscale);
      nameCanvas.height = Math.floor(nameH * upscale);
      nameCtx.imageSmoothingEnabled = true;
      nameCtx.imageSmoothingQuality = 'high';
      nameCtx.drawImage(video, nameX, nameY, nameW, nameH,
                       0, 0, nameCanvas.width, nameCanvas.height);

      // Produce binarized (Otsu-like) grayscale for OCR
      const binCanvas = binarize(nameCanvas);

      // Show in debug
      debugCanvas.width = binCanvas.width;
      debugCanvas.height = binCanvas.height;
      debugCtx.drawImage(binCanvas, 0, 0);

      const { data } = await worker.recognize(binCanvas);
      const rawText = (data.text || '').trim();
      const words = (data.words || []).filter(w => w.confidence > 30);

      // Try whole text + each word
      let best = null;
      const tryMatch = (t, conf) => {
        const m = findBestMatch(t);
        if (m && (!best || m.dist < best.match.dist)) {
          best = { match: m, raw: t, conf };
        }
      };
      tryMatch(rawText, data.confidence || 0);
      for (const w of words) tryMatch(w.text, w.confidence);

      if (best) {
        if (!current || current.name !== best.match.name) {
          statusEl.textContent = `✓ ${best.match.name}`;
          const img = await getSpriteFor(best.match.name);
          current = { name: best.match.name, img };
        }
        detectedEl.textContent = `${best.match.name} | "${best.raw}" d=${best.match.dist}`;
      } else {
        detectedEl.textContent = `reading: "${rawText}"`;
      }
    } catch (e) {
      console.error(e);
    } finally {
      ocrRunning = false;
    }
  }

  // Simple Otsu threshold implementation on a canvas
  function binarize(srcCanvas) {
    const w = srcCanvas.width, h = srcCanvas.height;
    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    const tctx = tmp.getContext('2d', { willReadFrequently: true });
    tctx.drawImage(srcCanvas, 0, 0);
    const imgData = tctx.getImageData(0, 0, w, h);
    const d = imgData.data;

    // Grayscale + histogram
    const hist = new Array(256).fill(0);
    const gray = new Uint8Array(w * h);
    for (let i = 0, j = 0; i < d.length; i += 4, j++) {
      const v = Math.round(0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]);
      gray[j] = v;
      hist[v]++;
    }

    // Otsu's method to find optimal threshold
    const total = w * h;
    let sum = 0; for (let i = 0; i < 256; i++) sum += i * hist[i];
    let sumB = 0, wB = 0, wF = 0, maxVar = 0, threshold = 128;
    for (let t = 0; t < 256; t++) {
      wB += hist[t]; if (wB === 0) continue;
      wF = total - wB; if (wF === 0) break;
      sumB += t * hist[t];
      const mB = sumB / wB, mF = (sum - sumB) / wF;
      const varBetween = wB * wF * (mB - mF) * (mB - mF);
      if (varBetween > maxVar) { maxVar = varBetween; threshold = t; }
    }

    // Determine polarity: most card names are dark-ish text outlined in white/yellow,
    // but Pokémon TCG often has *white text with black outline*. To handle both,
    // pick whichever polarity produces fewer "on" pixels in the middle band
    // (text should be the minority). Actually simpler: produce both and let OCR
    // pick via fuzzy match — but since we only have one output here, use whichever
    // has roughly 10-40% "on" pixels which is typical for text.
    let blackCount = 0;
    for (let j = 0; j < gray.length; j++) if (gray[j] < threshold) blackCount++;
    const blackFrac = blackCount / gray.length;
    // If black makes up >50%, invert
    const invert = blackFrac > 0.5;

    for (let i = 0, j = 0; i < d.length; i += 4, j++) {
      const isDark = gray[j] < threshold;
      const on = invert ? !isDark : isDark;
      const val = on ? 0 : 255;
      d[i] = d[i+1] = d[i+2] = val;
    }
    tctx.putImageData(imgData, 0, 0);
    return tmp;
  }

  // --- Render loop ---
  function renderLoop() {
    const W = overlay.clientWidth, H = overlay.clientHeight;
    ctx.clearRect(0, 0, W, H);
    if (!video.videoWidth) { requestAnimationFrame(renderLoop); return; }

    pulsePhase += 0.05;

    // Draw dashed target card outline
    const target = getTargetBox();
    const isLocked = !!current;
    const outlineColor = isLocked ? 'rgba(102, 255, 153, 0.95)' : 'rgba(255, 203, 5, 0.95)';
    const glow = 0.5 + 0.5 * Math.sin(pulsePhase);

    ctx.save();
    ctx.strokeStyle = outlineColor;
    ctx.lineWidth = 3;
    ctx.setLineDash(isLocked ? [] : [12, 8]);
    // Dim outer area slightly to draw attention inside
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(0, 0, W, target.y);                         // top
    ctx.fillRect(0, target.y + target.h, W, H - (target.y + target.h)); // bottom
    ctx.fillRect(0, target.y, target.x, target.h);           // left
    ctx.fillRect(target.x + target.w, target.y, W - (target.x + target.w), target.h); // right
    ctx.restore();

    // Corner brackets (more visible than a simple rectangle)
    drawCornerBrackets(target, outlineColor, isLocked ? 4 : 3);

    // Name band indicator inside the target
    const nameBand = {
      x: target.x + target.w * 0.03,
      y: target.y + target.h * 0.03,
      w: target.w * 0.72,
      h: target.h * 0.13
    };
    ctx.strokeStyle = `rgba(59,130,246, ${0.6 + 0.3 * glow})`;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(nameBand.x, nameBand.y, nameBand.w, nameBand.h);
    ctx.setLineDash([]);

    // Helper label
    ctx.fillStyle = 'rgba(59,130,246,0.9)';
    ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText('name', nameBand.x + 2, nameBand.y - 3);
    ctx.restore();

    // Draw sprite above the card
    if (current && current.img) {
      const anchorX = target.x + target.w / 2;
      const anchorY = target.y;
      const cardScreenH = target.h;
      const spriteH = Math.max(140, cardScreenH * 0.7);
      const spriteW = spriteH;
      let spriteX = anchorX - spriteW / 2;
      let spriteY = anchorY - spriteH - 8;
      if (spriteY < 60) spriteY = anchorY + 8;

      // Soft shadow at card top
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.ellipse(anchorX, anchorY, spriteW * 0.3, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      const bob = Math.sin(Date.now() / 400) * 4;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(current.img, spriteX, spriteY + bob, spriteW, spriteH);
    }

    requestAnimationFrame(renderLoop);
  }

  function drawCornerBrackets(rect, color, lineWidth) {
    const L = Math.min(rect.w, rect.h) * 0.12;  // bracket length
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.setLineDash([]);
    ctx.lineCap = 'round';
    // TL
    ctx.beginPath();
    ctx.moveTo(rect.x, rect.y + L);
    ctx.lineTo(rect.x, rect.y);
    ctx.lineTo(rect.x + L, rect.y);
    ctx.stroke();
    // TR
    ctx.beginPath();
    ctx.moveTo(rect.x + rect.w - L, rect.y);
    ctx.lineTo(rect.x + rect.w, rect.y);
    ctx.lineTo(rect.x + rect.w, rect.y + L);
    ctx.stroke();
    // BR
    ctx.beginPath();
    ctx.moveTo(rect.x + rect.w, rect.y + rect.h - L);
    ctx.lineTo(rect.x + rect.w, rect.y + rect.h);
    ctx.lineTo(rect.x + rect.w - L, rect.y + rect.h);
    ctx.stroke();
    // BL
    ctx.beginPath();
    ctx.moveTo(rect.x + L, rect.y + rect.h);
    ctx.lineTo(rect.x, rect.y + rect.h);
    ctx.lineTo(rect.x, rect.y + rect.h - L);
    ctx.stroke();
    ctx.restore();
  }

  startBtn.addEventListener('click', start);
</script>

</body>
</html>
