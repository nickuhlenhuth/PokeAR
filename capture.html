<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>PokeBattle — Capture</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111; color: white;
    }

    main {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; padding: 24px; text-align: center;
    }

    #title { font-size: 22px; margin: 0 0 8px; font-weight: 700; }
    #room-label { font-size: 12px; color: #888; margin-bottom: 24px; letter-spacing: 1px; }
    #room-label code {
      font-family: ui-monospace, Menlo, monospace;
      background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px;
      font-size: 14px; letter-spacing: 2px; color: #fff;
    }

    #status-card {
      background: #1e1e28;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 24px 28px;
      min-width: 260px;
      max-width: 360px;
      transition: background 0.2s, border-color 0.2s;
    }
    #status-card.assigned {
      background: rgba(20, 120, 50, 0.25);
      border-color: rgba(120, 255, 150, 0.5);
    }
    #status-card.error, #status-card.full {
      background: rgba(140, 30, 30, 0.25);
      border-color: rgba(255, 120, 120, 0.5);
    }
    #status-headline {
      font-size: 18px; font-weight: 700; margin-bottom: 6px;
    }
    #status-detail {
      font-size: 13px; color: #bbb; line-height: 1.5;
    }

    .spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: rgba(255,255,255,0.8);
      animation: spin 0.9s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #setup-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10, 10, 15, 0.96);
      display: none;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    #setup-overlay.active { display: flex; }
    #setup-overlay .box {
      max-width: 520px;
      background: #1a1a22;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 28px;
      line-height: 1.55;
    }
    #setup-overlay h2 { margin: 0 0 12px; font-size: 20px; }
    #setup-overlay p { font-size: 14px; color: #ccc; }
    #setup-overlay code {
      font-family: ui-monospace, Menlo, monospace;
      background: #2a2a35; padding: 2px 6px; border-radius: 4px; font-size: 12px;
    }
  </style>
</head>
<body>

<main>
  <div id="title">PokeBattle</div>
  <div id="room-label">Room: <code id="room-code-value">—</code></div>
  <div id="status-card">
    <div id="status-headline"><span class="spinner"></span>Connecting…</div>
    <div id="status-detail">Joining the battle room.</div>
  </div>
</main>

<div id="setup-overlay">
  <div class="box">
    <h2>Supabase not configured</h2>
    <p>Open <code>shared.js</code>, paste your Supabase <code>URL</code> and <code>anon key</code>, and reload.</p>
    <p style="margin-top:10px;color:#888;font-size:12px;">Setup instructions are on the battlefield page.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<script src="capture.js"></script>

</body>
</html>
